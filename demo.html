<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajectory Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            background: white;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Left panel - 20% */
        .input-panel {
            width: 20%;
            background: #f5f5f5;
            border-right: 1px solid #ccc;
            padding: 15px;
            overflow-y: auto;
        }

        .input-panel h3 {
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Right panel - 80% */
        .viz-panel {
            width: 80%;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        canvas {
            border: 1px solid #ccc;
            background: white;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 4px;
            text-align: center;
        }

        th {
            background: #e0e0e0;
        }

        input {
            width: 60px;
            padding: 2px;
            font-size: 11px;
            text-align: center;
        }

        button {
            padding: 4px 8px;
            font-size: 11px;
            margin: 2px;
            cursor: pointer;
        }

        .status {
            font-size: 11px;
            margin-top: 10px;
            color: #333;
        }

        .btn-group {
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Left: Input Panel (20%) -->
    <div class="input-panel">
        <h3>Waypoints (x, y, t)</h3>
        
        <div class="btn-group">
            <button id="loadBtn">Load from JSON</button>
            <input type="file" id="loadFileInput" accept=".json" style="display: none;">
            <button id="uploadPredBtn">Upload Pred</button>
            <input type="file" id="uploadPredInput" accept=".json" style="display: none;">
            <button id="addBtn">+ Add</button>
            <button id="removeBtn">- Remove</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div class="param-group" style="margin-top: 10px; margin-bottom: 10px;">
            <label>ε (bin width):</label>
            <input type="number" id="epsilonInput" value="1" step="0.5" min="0.1" style="width: 60px;">
        </div>

        <div style="overflow-x: auto;">
            <table id="waypointTable">
                <thead>
                    <tr><th>#</th><th>x</th><th>y</th><th>t</th></tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        <div class="btn-group">
            <button onclick="generateNoiseTrajectory()">
                Add Noise
            </button>
            <button id="clearNoiseBtn">Clear Noise</button>
            <button id="clearPredBtn">Clear Pred</button>
            <button onclick="saveToJSON()">
                Save to JSON
            </button>
        </div>
        <div class="status" id="statusMsg">
            ● Add waypoints
        </div>
    </div>

    <!-- Right: Visualization Panel (80%) -->
    <div class="viz-panel">
        <canvas id="trajCanvas" width="2000" height="1400" style="width:100%; height:auto; max-width:1200px; background:white;"></canvas>
        <div style="font-size:11px; margin-top:8px;">
            <span style="color:#3366ff;">● Ground Truth (blue)</span> &nbsp;&nbsp;
            <span style="color:#ff3333;">● Noisy Trajectories (red)</span> &nbsp;&nbsp;
            <span style="color:#33cc33;">● Prediction (green)</span>
        </div>
    </div>
</div>

<script>
    let waypoint_list = [];  // Index 0 = ground truth, rest = noisy trajectories
    let noisyTrajectories = [];  // Store noisy trajectories separately
    let predictionTrajectory = null;  // Store prediction trajectory
    let EPS_BIN = 1;

    const canvas = document.getElementById('trajCanvas');
    const ctx = canvas.getContext('2d');

    // Default waypoints
    function initDefault() {
        waypoint_list = [];
        noisyTrajectories = [];
        predictionTrajectory = null;
        waypoint_list.push([
            { x: 100, y: 400, t: 0 },
            { x: 350, y: 250, t: 5 },
            { x: 600, y: 380, t: 10 }
        ]);
        renderTable();
        drawCanvas();
    }

    // Renders the ground truth trajectory
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const waypoints = waypoint_list[0];
        if (!waypoints) return;
        
        for (let i = 0; i < waypoints.length; i++) {
            const wp = waypoints[i];
            const row = tbody.insertRow();
            
            row.insertCell(0).innerText = i;
            
            const xCell = row.insertCell(1);
            const xInput = document.createElement('input');
            xInput.type = 'number';
            xInput.value = wp.x;
            xInput.step = 'any';
            xInput.onchange = ((idx) => (e) => {
                waypoints[idx].x = parseFloat(e.target.value);
                drawCanvas();
            })(i);
            xCell.appendChild(xInput);
            
            const yCell = row.insertCell(2);
            const yInput = document.createElement('input');
            yInput.type = 'number';
            yInput.value = wp.y;
            yInput.step = 'any';
            yInput.onchange = ((idx) => (e) => {
                waypoints[idx].y = parseFloat(e.target.value);
                drawCanvas();
            })(i);
            yCell.appendChild(yInput);
            
            const tCell = row.insertCell(3);
            const tInput = document.createElement('input');
            tInput.type = 'number';
            tInput.value = wp.t;
            tInput.step = 'any';
            tInput.onchange = ((idx) => (e) => {
                waypoints[idx].t = parseFloat(e.target.value);
                drawCanvas();
            })(i);
            tCell.appendChild(tInput);
        }
        
        document.getElementById('statusMsg').innerHTML = `● ${waypoints.length} waypoint(s) | ${noisyTrajectories.length} noisy traj(s) | ${predictionTrajectory ? 'Pred loaded' : 'No pred'}`;
        drawCanvas();
    }

    function addWaypoint() {
        const waypoints = waypoint_list[0];
        let last = waypoints[waypoints.length - 1];
        let newX = last ? last.x + 50 : 100;
        let newY = last ? last.y : 300;
        let newT = last ? last.t + 3 : 0;
        waypoints.push({ x: newX, y: newY, t: newT });
        renderTable();
    }

    function removeLast() {
        const waypoints = waypoint_list[0];
        if (waypoints.length > 1) waypoints.pop();
        else if (waypoints.length === 1) waypoints = [];
        renderTable();
    }

    function resetAll() {
        initDefault();
    }

    function clearNoise() {
        // Keep only ground truth (index 0)
        while (waypoint_list.length > 1) {
            waypoint_list.pop();
        }
        noisyTrajectories = [];
        renderTable();
        drawCanvas();
        document.getElementById('statusMsg').innerHTML = `● ${waypoint_list[0].length} waypoint(s) | Noise cleared`;
    }

    function clearPred() {
        predictionTrajectory = null;
        renderTable();
        drawCanvas();
        document.getElementById('statusMsg').innerHTML = `● ${waypoint_list[0].length} waypoint(s) | ${noisyTrajectories.length} noisy traj(s) | Pred cleared`;
    }

    // Gaussian Random Noise
    function gaussianRandom(mean=0, stdev=1) {
        const u = 1 - Math.random();
        const v = Math.random();
        const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        return z * stdev + mean;
    }

    // Uniform Noise

    function generateNoiseTrajectory(maxNoiseTraj=5, noiseMean=0, noiseStd=30) {
        noisyTrajectories = [];
        const numNoiseTraj = Math.floor(Math.random() * maxNoiseTraj) + 1;
        const baseTraj = waypoint_list[0];
        
        for (let i = 0; i < numNoiseTraj; i++) {
            const newTraj = [];
            
            for (let pt = 0; pt < baseTraj.length; pt++) {
                const cp = baseTraj[pt];
                
                // Keep start and end points fixed
                if (pt === 0 || pt === baseTraj.length - 1) {
                    newTraj.push({ x: cp.x, y: cp.y, t: cp.t });
                } else {
                    const noisyX = cp.x + gaussianRandom(noiseMean, noiseStd);
                    const noisyY = cp.y + gaussianRandom(noiseMean, noiseStd);
                    const noisyT = cp.t + gaussianRandom(noiseMean, 0.5);
                    
                    newTraj.push({ 
                        x: noisyX, 
                        y: noisyY, 
                        t: noisyT
                    });
                }
            }
            
            // Sort by time
            newTraj.sort((a, b) => a.t - b.t);
            waypoint_list.push(newTraj);
            noisyTrajectories.push(newTraj);
        }
        
        renderTable();
        drawCanvas();
        document.getElementById('statusMsg').innerHTML = `● ${baseTraj.length} waypoint(s) | ${noisyTrajectories.length} noisy traj(s) | ${predictionTrajectory ? 'Pred loaded' : 'No pred'}`;
    }

    function saveToJSON() {
        if (waypoint_list.length === 0 || waypoint_list[0].length === 0) {
            alert("No waypoints to save.");
            return;
        }

        const data = {
            ground_truth: waypoint_list[0],
            noisy_trajectories: noisyTrajectories,
            num_noisy: noisyTrajectories.length,
            timestamp: new Date().toISOString()
        };

        const jsonStr = JSON.stringify(data, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `trajectory.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function uploadPred() {
        document.getElementById('uploadPredInput').click();
    }

    function handlePredLoad(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                
                // Handle different possible JSON formats
                let predData = null;
                
                // Check for common formats
                if (data.prediction) {
                    predData = data.prediction;
                } else if (data.ground_truth) {
                    predData = data.ground_truth;
                } else if (Array.isArray(data)) {
                    predData = data;
                } else if (data.data && Array.isArray(data.data)) {
                    predData = data.data;
                } else {
                    // Try to find any array in the data
                    for (let key in data) {
                        if (Array.isArray(data[key]) && data[key].length > 0 && data[key][0].hasOwnProperty('x')) {
                            predData = data[key];
                            break;
                        }
                    }
                }
                
                if (!predData || !Array.isArray(predData)) {
                    alert("No valid prediction trajectory found in JSON. Expected format: {prediction: [{x, y, t}]} or [{x, y, t}]");
                    return;
                }
                
                // Convert to standard format
                predictionTrajectory = predData.map(point => ({
                    x: parseFloat(point.x),
                    y: parseFloat(point.y),
                    t: parseFloat(point.t)
                }));
                
                // Sort by time
                predictionTrajectory.sort((a, b) => a.t - b.t);
                
                renderTable();
                drawCanvas();
                
                document.getElementById('statusMsg').innerHTML = `● Loaded pred: ${predictionTrajectory.length} points | ${noisyTrajectories.length} noisy traj(s)`;
                
            } catch (err) {
                alert("Error parsing JSON file: " + err.message);
            }
        };
        
        reader.onerror = function() {
            alert("Error reading file");
        };
        
        reader.readAsText(file);
        
        // Clear the input so the same file can be loaded again
        event.target.value = '';
    }

    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw grid
        ctx.beginPath();
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= canvas.width; x += 50) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += 50) {
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
        
        // Draw axes
        ctx.beginPath();
        ctx.strokeStyle = '#999';
        ctx.lineWidth = 1;
        ctx.moveTo(0, canvas.height/2);
        ctx.lineTo(canvas.width, canvas.height/2);
        ctx.moveTo(canvas.width/2, 0);
        ctx.lineTo(canvas.width/2, canvas.height);
        ctx.stroke();
        
        // ========== DRAW EPSILON BINS (Blue dashed vertical lines) ==========
        const waypoints = waypoint_list[0];
        if (waypoints && waypoints.length >= 2) {
            const t0 = waypoints[0].t;
            const tk = waypoints[waypoints.length - 1].t;
            const epsilon = EPS_BIN;  // Use your epsilon value (e.g., 1)
            
            // Draw vertical dashed lines for each bin boundary
            ctx.beginPath();
            ctx.strokeStyle = '#3366ff';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([8, 6]);  // Dashed line pattern
            
            for (let t = t0; t <= tk; t += epsilon) {
                // Find x position on canvas for this time
                // Interpolate time to x position based on ground truth trajectory
                let xPos = null;
                
                // Find which segment this time falls into
                for (let i = 0; i < waypoints.length - 1; i++) {
                    const wp1 = waypoints[i];
                    const wp2 = waypoints[i + 1];
                    
                    if (t >= wp1.t && t <= wp2.t) {
                        // Linear interpolation to find x at time t
                        const frac = (t - wp1.t) / (wp2.t - wp1.t);
                        xPos = wp1.x + frac * (wp2.x - wp1.x);
                        break;
                    }
                }
                
                if (xPos !== null) {
                    ctx.moveTo(xPos, 0);
                    ctx.lineTo(xPos, canvas.height);
                    ctx.stroke();
                }
            }
            
            // Draw bin center markers (optional - small circles on the line)
            ctx.setLineDash([]);  // Reset to solid
            ctx.fillStyle = '#3366ff';
            ctx.globalAlpha = 0.5;
            for (let t = t0 + epsilon/2; t <= tk; t += epsilon) {
                let xPos = null;
                for (let i = 0; i < waypoints.length - 1; i++) {
                    const wp1 = waypoints[i];
                    const wp2 = waypoints[i + 1];
                    if (t >= wp1.t && t <= wp2.t) {
                        const frac = (t - wp1.t) / (wp2.t - wp1.t);
                        xPos = wp1.x + frac * (wp2.x - wp1.x);
                        break;
                    }
                }
                if (xPos !== null) {
                    ctx.beginPath();
                    ctx.arc(xPos, canvas.height/2, 5, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;
        }
        
        // Draw noisy trajectories (red, semi-transparent)
        for (let t = 0; t < noisyTrajectories.length; t++) {
            const traj = noisyTrajectories[t];
            if (traj.length >= 2) {
                ctx.beginPath();
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.5;
                ctx.moveTo(traj[0].x, traj[0].y);
                for (let i = 1; i < traj.length; i++) {
                    ctx.lineTo(traj[i].x, traj[i].y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(traj[i].x, traj[i].y);
                }
            }
        }
        
        // Draw prediction trajectory (green)
        if (predictionTrajectory && predictionTrajectory.length >= 2) {
            ctx.beginPath();
            ctx.strokeStyle = '#33cc33';
            ctx.lineWidth = 3;
            ctx.globalAlpha = 0.8;
            ctx.moveTo(predictionTrajectory[0].x, predictionTrajectory[0].y);
            for (let i = 1; i < predictionTrajectory.length; i++) {
                ctx.lineTo(predictionTrajectory[i].x, predictionTrajectory[i].y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(predictionTrajectory[i].x, predictionTrajectory[i].y);
            }
            
            // Draw prediction waypoints
            for (let i = 0; i < predictionTrajectory.length; i++) {
                ctx.beginPath();
                ctx.arc(predictionTrajectory[i].x, predictionTrajectory[i].y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#33cc33';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(predictionTrajectory[i].x, predictionTrajectory[i].y, 3, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                ctx.fillStyle = '#33cc33';
                ctx.font = 'bold 12px monospace';
                ctx.fillText(i, predictionTrajectory[i].x - 3, predictionTrajectory[i].y - 5);
            }
        }
        ctx.globalAlpha = 1.0;
        
        // Draw ground truth trajectory (blue)
        if (waypoints && waypoints.length >= 2) {
            ctx.beginPath();
            ctx.strokeStyle = '#3366ff';
            ctx.lineWidth = 3;
            ctx.moveTo(waypoints[0].x, waypoints[0].y);
            for (let i = 1; i < waypoints.length; i++) {
                ctx.lineTo(waypoints[i].x, waypoints[i].y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(waypoints[i].x, waypoints[i].y);
            }
        }
        
        // Draw ground truth waypoints - BOLD VERTICES
        if (waypoints) {
            for (let i = 0; i < waypoints.length; i++) {
                ctx.beginPath();
                ctx.arc(waypoints[i].x, waypoints[i].y, 8, 0, 2 * Math.PI);
                ctx.fillStyle = '#3366ff';
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(waypoints[i].x, waypoints[i].y, 5, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                ctx.fillStyle = '#3366ff';
                ctx.font = 'bold 14px monospace';
                ctx.fillText(i, waypoints[i].x - 4, waypoints[i].y - 6);
            }
        }
        
        // Draw noisy waypoints (small red dots)
        for (let t = 0; t < noisyTrajectories.length; t++) {
            const traj = noisyTrajectories[t];
            for (let i = 1; i < traj.length - 1; i++) {
                ctx.beginPath();
                ctx.arc(traj[i].x, traj[i].y, 3, 0, 2 * Math.PI);
                ctx.fillStyle = '#ff6666';
                ctx.fill();
            }
        }
        
        // Reset line dash
        ctx.setLineDash([]);
    }

    function updateEpsilon() {
        EPS_BIN = parseFloat(document.getElementById('epsilonInput').value);
        drawCanvas();
    }
    
    function loadFromJSON() {
        document.getElementById('loadFileInput').click();
    }

    function handleFileLoad(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                
                // Clear existing data
                waypoint_list = [];
                noisyTrajectories = [];
                
                // Load ground truth
                if (data.ground_truth) {
                    waypoint_list.push(data.ground_truth);
                } else if (data.waypoints) {
                    // Handle older format
                    waypoint_list.push(data.waypoints);
                } else {
                    alert("No valid trajectory data found in JSON");
                    return;
                }
                
                // Load noisy trajectories if present
                if (data.noisy_trajectories && Array.isArray(data.noisy_trajectories)) {
                    for (let traj of data.noisy_trajectories) {
                        waypoint_list.push(traj);
                        noisyTrajectories.push(traj);
                    }
                }
                
                // Update UI
                renderTable();
                drawCanvas();
                
                document.getElementById('statusMsg').innerHTML = `● Loaded: ${waypoint_list[0].length} waypoints | ${noisyTrajectories.length} noisy traj(s) | ${predictionTrajectory ? 'Pred loaded' : 'No pred'}`;
                
            } catch (err) {
                alert("Error parsing JSON file: " + err.message);
            }
        };
        
        reader.onerror = function() {
            alert("Error reading file");
        };
        
        reader.readAsText(file);
        
        // Clear the input so the same file can be loaded again
        event.target.value = '';
    }

    document.getElementById('addBtn').onclick = addWaypoint;
    document.getElementById('removeBtn').onclick = removeLast;
    document.getElementById('resetBtn').onclick = resetAll;
    document.getElementById('clearNoiseBtn').onclick = clearNoise;
    document.getElementById('clearPredBtn').onclick = clearPred;
    document.getElementById('epsilonInput').onchange = updateEpsilon;
    document.getElementById('loadBtn').onclick = loadFromJSON;
    document.getElementById('loadFileInput').onchange = handleFileLoad;
    document.getElementById('uploadPredBtn').onclick = uploadPred;
    document.getElementById('uploadPredInput').onchange = handlePredLoad;

    initDefault();
</script>
</body>
</html>
